<script type="text/html" data-help-name="enrichlayer-search">
    <p>Query Enrich Layer Search endpoints.</p>
    <h3>Operations</h3>
    <dl class="message-properties">
        <dt>Search Companies <span class="property-type">3 credits/URL</span></dt>
        <dd>Search for companies by criteria. All parameters are optional.</dd>
        <dt>Search People <span class="property-type">3 credits/URL</span></dt>
        <dd>Search for people by criteria. Country is required.</dd>
    </dl>
    <h3>Inputs</h3>
    <p>Set parameters via <code>msg.payload</code> properties. Runtime values override node config.</p>
    <h3>Outputs</h3>
    <p><code>msg.payload</code> contains the API response object.</p>
</script>

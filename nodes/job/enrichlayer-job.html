<script type="text/javascript">
    RED.nodes.registerType('enrichlayer-job', {
        category: 'Enrich Layer',
        color: '#6366F1',
        defaults: {
            name: { value: '' },
            config: { value: '', type: 'enrichlayer-config', required: true },
            operation: { value: 'getJobProfile' },
            url: { value: '' },
            search_id: { value: '' },
            job_type: { value: '' },
            experience_level: { value: '' },
            when: { value: '' },
            flexibility: { value: '' },
            geo_id: { value: '' },
            keyword: { value: '' }
        },
        inputs: 1,
        outputs: 1,
        icon: 'enrichlayer.svg',
        label: function () {
            var ops = {
                getJobProfile: 'Get Profile',
                searchJobs: 'Search Jobs',
                getJobCount: 'Job Count'
            };
            return this.name || 'Job: ' + (ops[this.operation] || this.operation);
        },
        paletteLabel: 'job',
        oneditprepare: function () {
            var opFields = {
                getJobProfile: ['url'],
                searchJobs: ['search_id', 'job_type', 'experience_level', 'when', 'flexibility', 'geo_id', 'keyword'],
                getJobCount: ['search_id', 'job_type', 'experience_level', 'when', 'flexibility', 'geo_id', 'keyword']
            };
            function showFields() {
                var op = $('#node-input-operation').val();
                $('.el-field').hide();
                var fields = opFields[op] || [];
                fields.forEach(function (f) { $('.el-field-' + f).show(); });
            }
            $('#node-input-operation').on('change', showFields);
            showFields();
        }
    });
</script>

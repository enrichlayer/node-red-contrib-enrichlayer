<script type="text/javascript">
    RED.nodes.registerType('enrichlayer-school', {
        category: 'Enrich Layer',
        color: '#6366F1',
        defaults: {
            name: { value: '' },
            config: { value: '', type: 'enrichlayer-config', required: true },
            operation: { value: 'getSchoolProfile' },
            url: { value: '' },
            school_url: { value: '' },
            use_cache: { value: '' },
            live_fetch: { value: '' },
            boolean_search_keyword: { value: '' },
            country: { value: '' },
            enrich_profiles: { value: '' },
            page_size: { value: '' },
            resolve_numeric_id: { value: '' },
            sort_by: { value: '' },
            student_status: { value: '' }
        },
        inputs: 1,
        outputs: 1,
        icon: 'enrichlayer.svg',
        label: function () {
            var ops = {
                getSchoolProfile: 'Get Profile',
                listStudents: 'List Students'
            };
            return this.name || 'School: ' + (ops[this.operation] || this.operation);
        },
        paletteLabel: 'school',
        oneditprepare: function () {
            var opFields = {
                getSchoolProfile: ['url', 'use_cache', 'live_fetch'],
                listStudents: ['school_url', 'boolean_search_keyword', 'country', 'enrich_profiles', 'page_size', 'resolve_numeric_id', 'sort_by', 'student_status']
            };
            function showFields() {
                var op = $('#node-input-operation').val();
                $('.el-field').hide();
                var fields = opFields[op] || [];
                fields.forEach(function (f) { $('.el-field-' + f).show(); });
            }
            $('#node-input-operation').on('change', showFields);
            showFields();
        }
    });
</script>

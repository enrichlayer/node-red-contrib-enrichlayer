<script type="text/javascript">
    RED.nodes.registerType('enrichlayer-person', {
        category: 'Enrich Layer',
        color: '#6366F1',
        defaults: {
            name: { value: '' },
            config: { value: '', type: 'enrichlayer-config', required: true },
            operation: { value: 'getPersonProfile' },
            profile_url: { value: '' },
            twitter_profile_url: { value: '' },
            facebook_profile_url: { value: '' },
            first_name: { value: '' },
            company_domain: { value: '' },
            last_name: { value: '' },
            title: { value: '' },
            location: { value: '' },
            similarity_checks: { value: '' },
            enrich_profile: { value: '' },
            person_profile_url: { value: '' },
            company_name: { value: '' },
            role: { value: '' },
            extra: { value: '' },
            personal_contact_number: { value: '' },
            personal_email: { value: '' },
            skills: { value: '' },
            use_cache: { value: '' }
        },
        inputs: 1,
        outputs: 1,
        icon: 'enrichlayer.svg',
        label: function () {
            var ops = {
                getPersonProfile: 'Get Profile',
                lookupPerson: 'Lookup',
                getPersonProfilePicture: 'Picture',
                lookupRole: 'Role Lookup'
            };
            return this.name || 'Person: ' + (ops[this.operation] || this.operation);
        },
        paletteLabel: 'person',
        oneditprepare: function () {
            var opFields = {
                getPersonProfile: ['profile_url', 'twitter_profile_url', 'facebook_profile_url', 'extra', 'personal_contact_number', 'personal_email', 'skills', 'use_cache'],
                lookupPerson: ['first_name', 'company_domain', 'last_name', 'title', 'location', 'similarity_checks', 'enrich_profile'],
                getPersonProfilePicture: ['person_profile_url'],
                lookupRole: ['company_name', 'role', 'enrich_profile']
            };
            function showFields() {
                var op = $('#node-input-operation').val();
                $('.el-field').hide();
                var fields = opFields[op] || [];
                fields.forEach(function (f) { $('.el-field-' + f).show(); });
            }
            $('#node-input-operation').on('change', showFields);
            showFields();
        }
    });
</script>

<script type="text/html" data-help-name="enrichlayer-person">
    <p>Query Enrich Layer Person endpoints.</p>
    <h3>Operations</h3>
    <dl class="message-properties">
        <dt>Get Person Profile <span class="property-type">1 credit</span></dt>
        <dd>Get structured data of a Person Profile.</dd>
        <dt>Lookup Person <span class="property-type">2 credits</span></dt>
        <dd>Look up a person by name and company.</dd>
        <dt>Get Profile Picture <span class="property-type">0 credits</span></dt>
        <dd>Get the profile picture URL of a person.</dd>
        <dt>Role Lookup <span class="property-type">3 credits</span></dt>
        <dd>Look up a person by their role at a company.</dd>
    </dl>
    <h3>Inputs</h3>
    <p>Set parameters via <code>msg.payload</code> properties. Runtime values override node config.</p>
    <h3>Outputs</h3>
    <p><code>msg.payload</code> contains the API response object.</p>
</script>

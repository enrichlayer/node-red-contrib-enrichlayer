<script type="text/javascript">
    RED.nodes.registerType('enrichlayer-company', {
        category: 'Enrich Layer',
        color: '#6366F1',
        defaults: {
            name: { value: '' },
            config: { value: '', type: 'enrichlayer-config', required: true },
            operation: { value: 'getCompanyProfile' },
            url: { value: '' },
            company_domain: { value: '' },
            company_name: { value: '' },
            id: { value: '' },
            company_profile_url: { value: '' },
            keyword_boolean: { value: '' },
            categories: { value: '' },
            funding_data: { value: '' },
            exit_data: { value: '' },
            acquisitions: { value: '' },
            extra: { value: '' },
            use_cache: { value: '' },
            company_location: { value: '' },
            enrich_profile: { value: '' },
            enrich_profiles: { value: '' },
            boolean_role_search: { value: '' },
            coy_name_match: { value: '' },
            country: { value: '' },
            employment_status: { value: '' },
            page_size: { value: '' },
            resolve_numeric_id: { value: '' },
            sort_by: { value: '' },
            at_date: { value: '' },
            estimated_employee_count: { value: '' }
        },
        inputs: 1,
        outputs: 1,
        icon: 'enrichlayer.svg',
        label: function () {
            var ops = {
                getCompanyProfile: 'Get Profile',
                lookupCompany: 'Lookup',
                lookupCompanyById: 'ID Lookup',
                getCompanyProfilePicture: 'Picture',
                listEmployees: 'List Employees',
                getEmployeeCount: 'Employee Count',
                searchEmployees: 'Search Employees'
            };
            return this.name || 'Company: ' + (ops[this.operation] || this.operation);
        },
        paletteLabel: 'company',
        oneditprepare: function () {
            var opFields = {
                getCompanyProfile: ['url', 'categories', 'funding_data', 'exit_data', 'acquisitions', 'extra', 'use_cache'],
                lookupCompany: ['company_domain', 'company_name', 'company_location', 'enrich_profile'],
                lookupCompanyById: ['id'],
                getCompanyProfilePicture: ['company_profile_url'],
                listEmployees: ['url', 'boolean_role_search', 'coy_name_match', 'country', 'employment_status', 'enrich_profiles', 'page_size', 'resolve_numeric_id', 'sort_by', 'use_cache'],
                getEmployeeCount: ['url', 'at_date', 'coy_name_match', 'employment_status', 'estimated_employee_count', 'use_cache'],
                searchEmployees: ['company_profile_url', 'keyword_boolean', 'country', 'enrich_profiles', 'page_size', 'resolve_numeric_id']
            };
            function showFields() {
                var op = $('#node-input-operation').val();
                $('.el-field').hide();
                var fields = opFields[op] || [];
                fields.forEach(function (f) { $('.el-field-' + f).show(); });
            }
            $('#node-input-operation').on('change', showFields);
            showFields();
        }
    });
</script>

<script type="text/html" data-help-name="enrichlayer-company">
    <p>Query Enrich Layer Company endpoints.</p>
    <h3>Operations</h3>
    <dl class="message-properties">
        <dt>Get Company Profile <span class="property-type">1 credit</span></dt>
        <dd>Get structured data of a Company Profile by URL.</dd>
        <dt>Lookup Company <span class="property-type">2 credits</span></dt>
        <dd>Look up a company by name or domain.</dd>
        <dt>Lookup Company by ID <span class="property-type">0 credits</span></dt>
        <dd>Look up a company by its internal numeric ID.</dd>
        <dt>Get Profile Picture <span class="property-type">0 credits</span></dt>
        <dd>Get the profile picture URL of a company.</dd>
        <dt>List Employees <span class="property-type">3 credits/employee</span></dt>
        <dd>List employees of a company.</dd>
        <dt>Get Employee Count <span class="property-type">1 credit</span></dt>
        <dd>Get the number of employees at a company.</dd>
        <dt>Search Employees <span class="property-type">10 credits</span></dt>
        <dd>Search employees by keyword at a company.</dd>
    </dl>
    <h3>Inputs</h3>
    <p>Set parameters via <code>msg.payload</code> properties (e.g. <code>msg.payload.url</code>).
       Runtime values override values set in the node config dialog.</p>
    <h3>Outputs</h3>
    <p><code>msg.payload</code> contains the API response object.</p>
</script>
